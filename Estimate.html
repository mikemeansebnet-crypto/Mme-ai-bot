<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Your Estimate</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #0d2137 50%, #0f2818 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 24px 16px 60px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }
        .business-name {
            font-size: 13px;
            color: #94a3b8;
            font-family: 'DM Mono', monospace;
            text-align: center;
            margin-bottom: 24px;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }
        .title { font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
        .label {
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'DM Mono', monospace;
            margin-bottom: 6px;
            margin-top: 14px;
        }
        .value { font-size: 15px; color: white; }
        .quote-range {
            font-size: 32px;
            font-weight: 700;
            color: #22c55e;
            margin: 8px 0;
        }
        .material-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            font-size: 14px;
        }
        .material-row:last-child { border-bottom: none; }
        .material-name { color: #f1f5f9; }
        .material-qty { color: #94a3b8; font-family: 'DM Mono', monospace; }
        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            margin-bottom: 10px;
        }
        .btn-approve { background: linear-gradient(135deg, #2563EB, #16a34a); color: white; }
        .btn-changes { background: #334155; color: #f1f5f9; border: 1px solid #475569; }
        .comments-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px 14px;
            color: white;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            resize: none;
            outline: none;
            margin-bottom: 10px;
        }
        .comments-input:focus { border-color: #2563EB; }
        .success-card {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .success-icon { font-size: 64px; margin-bottom: 16px; }
        .success-title { font-size: 24px; font-weight: 700; color: #22c55e; margin-bottom: 8px; }
        .success-sub { font-size: 14px; color: #94a3b8; }
        .disclaimer {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin-top: 16px;
            font-family: 'DM Mono', monospace;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }
        .loading { text-align: center; color: #94a3b8; font-family: 'DM Mono', monospace; padding: 40px; }
    </style>
</head>
<body>
    <div class="business-name" id="businessName">Loading...</div>
    <div id="mainContent"><div class="loading">Loading your estimate...</div></div>
    <div class="disclaimer">Estimates are approximate and based on visible conditions. Final pricing confirmed on-site. Materials quantities are estimated.</div>

    <script>
        const token = window.location.pathname.split('/').pop();

        async function loadEstimate() {
            try {
                const res = await fetch('/estimate-data/' + token);
                const data = await res.json();
                if (!data.ok) {
                    document.getElementById('mainContent').innerHTML = '<div class="loading">Estimate not found or already responded to.</div>';
                    return;
                }
                document.getElementById('businessName').textContent = data.business_name;
                renderEstimate(data);
            } catch(e) {
                document.getElementById('mainContent').innerHTML = '<div class="loading">Could not load estimate. Please try again.</div>';
            }
        }

        function renderEstimate(d) {
            const materials = d.materials || [];
            const materialsHtml = materials.length ? `
                <div class="label">Estimated Materials</div>
                ${materials.map(m => `
                    <div class="material-row">
                        <div class="material-name">${m.item}</div>
                        <div class="material-qty">${m.quantity} ${m.unit}</div>
                    </div>
                `).join('')}
            ` : '';

            document.getElementById('mainContent').innerHTML = `
                <div class="card">
                    <div class="title">Your Estimate</div>
                    <div class="label">Project</div>
                    <div class="value">${d.project_type || 'Service Estimate'}</div>
                    <div class="label">Property Address</div>
                    <div class="value">${d.address || ''}</div>
                    <div class="label">Estimated Price Range</div>
                    <div class="quote-range">$${Number(d.quote_low).toLocaleString()} - $${Number(d.quote_high).toLocaleString()}</div>
                    ${d.notes ? `<div class="label">Notes</div><div class="value">${d.notes}</div>` : ''}
                </div>
                ${materials.length ? `<div class="card">${materialsHtml}</div>` : ''}
                <div class="card" id="actionCard">
                    <div class="title" style="margin-bottom:16px">Looks good?</div>
                    <button class="btn btn-approve" onclick="respond('Approved')">Approve This Estimate</button>
                    <div style="text-align:center;color:#64748b;font-size:12px;margin:8px 0">or</div>
                    <textarea class="comments-input" id="commentsBox" rows="3" placeholder="Tell us what changes you need..."></textarea>
                    <button class="btn btn-changes" onclick="respond('Changes Requested')">Request Changes</button>
                </div>
                <div class="success-card" id="successCard">
                    <div class="success-icon" id="successIcon"></div>
                    <div class="success-title" id="successTitle"></div>
                    <div class="success-sub" id="successSub"></div>
                </div>
            `;
        }

        async function respond(action) {
            const comments = document.getElementById('commentsBox') ? document.getElementById('commentsBox').value.trim() : '';
            if (action === 'Changes Requested' && !comments) {
                alert('Please describe what changes you need.');
                return;
            }
            try {
                const res = await fetch('/estimate-respond/' + token, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, comments })
                });
                const data = await res.json();
                if (data.ok) {
                    document.getElementById('actionCard').style.display = 'none';
                    const success = document.getElementById('successCard');
                    success.style.display = 'block';
                    document.getElementById('successIcon').textContent = action === 'Approved' ? 'Thanks!' : 'Got it!';
                    document.getElementById('successTitle').textContent = action === 'Approved' ? 'Estimate Approved' : 'Changes Requested';
                    document.getElementById('successSub').textContent = action === 'Approved'
                        ? 'We will be in touch shortly to schedule your service.'
                        : 'We received your feedback and will be in touch with a revised estimate.';
                } else {
                    alert('Something went wrong. Please try again.');
                }
            } catch(e) {
                alert('Request failed. Please try again.');
            }
        }

        loadEstimate();
    </script>
</body>
</html>
